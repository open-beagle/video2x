<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 860" font-family="Microsoft YaHei, SimHei, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="moduleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#dbeafe;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="dangerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fff7ed;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#ffedd5;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow" x="-3%" y="-3%" width="106%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#64748b"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#059669"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#dc2626"/>
    </marker>
  </defs>

  <rect width="1100" height="860" rx="12" fill="#f8fafc"/>

  <rect x="0" y="0" width="1100" height="60" rx="12" fill="url(#headerGrad)"/>
  <rect x="0" y="28" width="1100" height="32" fill="url(#headerGrad)"/>
  <text x="550" y="27" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="bold">video2x AI 视频超分技术架构</text>
  <text x="550" y="49" text-anchor="middle" fill="#dbeafe" font-size="12">2 小时 · 720p/30fps · 约 216000 帧 · RTX 4090 · AI 超分至最终 1080p</text>

  <rect x="30" y="80" width="1040" height="92" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="1.5"/>
  <text x="550" y="104" text-anchor="middle" fill="#166534" font-size="15" font-weight="bold">用户输入层：普通用户只挂载目录，容器自动干活</text>
  <rect x="72" y="122" width="210" height="34" rx="8" fill="#ffffff" stroke="#4ade80"/>
  <text x="177" y="144" text-anchor="middle" fill="#166534" font-size="12">/data：720p/30fps 视频</text>
  <rect x="318" y="122" width="210" height="34" rx="8" fill="#ffffff" stroke="#4ade80"/>
  <text x="423" y="144" text-anchor="middle" fill="#166534" font-size="12">/models：模型权重</text>
  <rect x="572" y="122" width="210" height="34" rx="8" fill="#ffffff" stroke="#4ade80"/>
  <text x="677" y="144" text-anchor="middle" fill="#166534" font-size="12">Docker + NVIDIA GPU</text>
  <rect x="818" y="122" width="210" height="34" rx="8" fill="#ffffff" stroke="#4ade80"/>
  <text x="923" y="144" text-anchor="middle" fill="#166534" font-size="12">无需 AI 参数</text>

  <polyline points="550,172 550,190" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="477" y="178" width="146" height="18" rx="4" fill="#f8fafc" fill-opacity="0.9"/>
  <text x="550" y="191" text-anchor="middle" fill="#64748b" font-size="10">启动后先识别任务</text>

  <rect x="30" y="198" width="1040" height="142" rx="10" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="550" y="222" text-anchor="middle" fill="#1e3a5f" font-size="15" font-weight="bold">任务规划层：扫描、识别、决策，避免错误倍率浪费 4090</text>

  <rect x="60" y="242" width="220" height="72" rx="8" fill="url(#moduleGrad)" stroke="#93c5fd" filter="url(#shadow)"/>
  <rect x="60" y="242" width="220" height="28" rx="8" fill="#2563eb"/>
  <rect x="60" y="258" width="220" height="12" fill="#2563eb"/>
  <text x="170" y="261" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">扫描视频</text>
  <text x="78" y="288" fill="#1e3a5f" font-size="11">• 递归查找所有 .mp4</text>
  <text x="78" y="306" fill="#1e3a5f" font-size="11">• 跳过已输出文件</text>

  <rect x="320" y="242" width="220" height="72" rx="8" fill="url(#moduleGrad)" stroke="#93c5fd" filter="url(#shadow)"/>
  <rect x="320" y="242" width="220" height="28" rx="8" fill="#7c3aed"/>
  <rect x="320" y="258" width="220" height="12" fill="#7c3aed"/>
  <text x="430" y="261" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">探测元数据</text>
  <text x="338" y="288" fill="#1e3a5f" font-size="11">• 1280×720 / 30fps</text>
  <text x="338" y="306" fill="#1e3a5f" font-size="11">• 总帧数约 216000</text>

  <rect x="580" y="242" width="220" height="72" rx="8" fill="url(#moduleGrad)" stroke="#93c5fd" filter="url(#shadow)"/>
  <rect x="580" y="242" width="220" height="28" rx="8" fill="#059669"/>
  <rect x="580" y="258" width="220" height="12" fill="#059669"/>
  <text x="690" y="261" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">选择处理方案</text>
  <text x="598" y="288" fill="#1e3a5f" font-size="11">• 720p → outscale=1.5</text>
  <text x="598" y="306" fill="#1e3a5f" font-size="11">• 480p → outscale=2.25</text>

  <rect x="840" y="242" width="190" height="72" rx="8" fill="url(#moduleGrad)" stroke="#93c5fd" filter="url(#shadow)"/>
  <rect x="840" y="242" width="190" height="28" rx="8" fill="#d97706"/>
  <rect x="840" y="258" width="190" height="12" fill="#d97706"/>
  <text x="935" y="261" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">打印任务清单</text>
  <text x="858" y="288" fill="#1e3a5f" font-size="11">• 模型 / 倍率 / 输出</text>
  <text x="858" y="306" fill="#1e3a5f" font-size="11">• 先让用户看清楚</text>

  <polyline points="550,340 550,362" fill="none" stroke="#2563eb" stroke-width="2.2" marker-end="url(#arrowBlue)"/>
  <rect x="482" y="348" width="136" height="18" rx="4" fill="#f8fafc" fill-opacity="0.9"/>
  <text x="550" y="361" text-anchor="middle" fill="#2563eb" font-size="10">默认直接正式处理</text>

  <rect x="30" y="372" width="1040" height="174" rx="10" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="550" y="396" text-anchor="middle" fill="#5b21b6" font-size="15" font-weight="bold">高性能处理层：减少无效计算，让 RTX 4090 忙起来</text>

  <rect x="60" y="420" width="180" height="86" rx="8" fill="#ffffff" stroke="#c4b5fd" filter="url(#shadow)"/>
  <rect x="60" y="420" width="180" height="28" rx="8" fill="#475569"/>
  <rect x="60" y="436" width="180" height="12" fill="#475569"/>
  <text x="150" y="439" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">ffmpeg 解码</text>
  <text x="78" y="467" fill="#5b21b6" font-size="11">• 读取视频帧流</text>
  <text x="78" y="485" fill="#5b21b6" font-size="11">• 避免多余转码</text>

  <rect x="292" y="420" width="220" height="86" rx="8" fill="#ffffff" stroke="#c4b5fd" filter="url(#shadow)"/>
  <rect x="292" y="420" width="220" height="28" rx="8" fill="#7c3aed"/>
  <rect x="292" y="436" width="220" height="12" fill="#7c3aed"/>
  <text x="402" y="439" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">PyTorch CUDA 推理</text>
  <text x="310" y="467" fill="#5b21b6" font-size="11">• RealESRGAN_x2plus</text>
  <text x="310" y="485" fill="#5b21b6" font-size="11">• FP16 / tile 按显存调优</text>

  <rect x="562" y="420" width="220" height="86" rx="8" fill="#ffffff" stroke="#c4b5fd" filter="url(#shadow)"/>
  <rect x="562" y="420" width="220" height="28" rx="8" fill="#059669"/>
  <rect x="562" y="436" width="220" height="12" fill="#059669"/>
  <text x="672" y="439" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">最终 1080p 输出</text>
  <text x="580" y="467" fill="#5b21b6" font-size="11">• 720p 不再 x4 到 2880p</text>
  <text x="580" y="485" fill="#5b21b6" font-size="11">• outscale=1.5</text>

  <rect x="832" y="420" width="200" height="86" rx="8" fill="#ffffff" stroke="#c4b5fd" filter="url(#shadow)"/>
  <rect x="832" y="420" width="200" height="28" rx="8" fill="#d97706"/>
  <rect x="832" y="436" width="200" height="12" fill="#d97706"/>
  <text x="932" y="439" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="bold">编码与校验</text>
  <text x="850" y="467" fill="#5b21b6" font-size="11">• 保留音频 / 写出 mp4</text>
  <text x="850" y="485" fill="#5b21b6" font-size="11">• ffprobe 校验高度</text>

  <polyline points="240,463 292,463" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <polyline points="512,463 562,463" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <polyline points="782,463 832,463" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="112" y="522" width="876" height="14" rx="4" fill="#ede9fe"/>
  <rect x="112" y="522" width="655" height="14" rx="4" fill="#8b5cf6"/>
  <text x="550" y="534" text-anchor="middle" fill="#ffffff" font-size="10" font-weight="bold">目标吞吐：稳定接近或超过 30fps，让 216000 帧在 2 小时内完成</text>

  <polyline points="550,546 550,568" fill="none" stroke="#059669" stroke-width="2.2" marker-end="url(#arrowGreen)"/>

  <rect x="30" y="578" width="650" height="150" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="355" y="602" text-anchor="middle" fill="#334155" font-size="15" font-weight="bold">运行时观测：用日志证明 4090 真的忙起来</text>
  <rect x="60" y="624" width="180" height="76" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="150" y="647" text-anchor="middle" fill="#334155" font-size="20" font-weight="bold">32.4 fps</text>
  <text x="150" y="672" text-anchor="middle" fill="#64748b" font-size="11">超过 30fps 目标</text>
  <text x="150" y="690" text-anchor="middle" fill="#059669" font-size="11" font-weight="bold">预计 1h 51m 完成</text>

  <rect x="270" y="624" width="180" height="76" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="360" y="647" text-anchor="middle" fill="#334155" font-size="20" font-weight="bold">94%</text>
  <text x="360" y="672" text-anchor="middle" fill="#64748b" font-size="11">GPU 利用率</text>
  <text x="360" y="690" text-anchor="middle" fill="#059669" font-size="11" font-weight="bold">4090 高负载</text>

  <rect x="480" y="624" width="170" height="76" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="565" y="647" text-anchor="middle" fill="#334155" font-size="20" font-weight="bold">18.6GB</text>
  <text x="565" y="672" text-anchor="middle" fill="#64748b" font-size="11">显存占用</text>
  <text x="565" y="690" text-anchor="middle" fill="#059669" font-size="11" font-weight="bold">不是 1.2GB 闲置</text>

  <rect x="720" y="578" width="350" height="150" rx="10" fill="#fff7ed" stroke="#fdba74" stroke-width="1.5"/>
  <text x="895" y="602" text-anchor="middle" fill="#9a3412" font-size="15" font-weight="bold">旧路线必须替换的原因</text>
  <rect x="748" y="624" width="294" height="78" rx="8" fill="url(#dangerGrad)" stroke="#fb923c"/>
  <text x="768" y="647" fill="#9a3412" font-size="12">• x4 路线：720p 先 AI 到 2880p</text>
  <text x="768" y="669" fill="#9a3412" font-size="12">• RTX 4090 使用率约 60%，显存约 1.2GB</text>
  <text x="768" y="691" fill="#9a3412" font-size="12">• 单个长视频预计约 170 小时</text>

  <polyline points="895,728 895,754 550,754 550,780" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowRed)"/>
  <rect x="620" y="742" width="185" height="18" rx="4" fill="#f8fafc" fill-opacity="0.9"/>
  <text x="712" y="755" text-anchor="middle" fill="#dc2626" font-size="10">低利用率视为性能缺陷</text>

  <rect x="30" y="780" width="1040" height="54" rx="10" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1.5"/>
  <text x="550" y="805" text-anchor="middle" fill="#065f46" font-size="15" font-weight="bold">架构信心：砍掉 2880p 无效计算 + CUDA 推理 + 实时 fps/ETA/GPU 监控 + 瓶颈闭环</text>
  <text x="550" y="825" text-anchor="middle" fill="#047857" font-size="12">目标不是“能跑”，而是让 RTX 4090 忙起来，并用日志证明 2 小时 720p/30fps → 1080p 的吞吐是否达标</text>
</svg>
