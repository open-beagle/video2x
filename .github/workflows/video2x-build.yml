name: video2x-build

on:
  push:
    branches:
      - build

env:
  BUILD_VERSION: "0.3.0"
  CUDA_VERSION: "13.2.1"
  IMAGE_NAME: registry.cn-qingdao.aliyuncs.com/wod/video2x

jobs:
  video2x-build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo docker image prune --all --force

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Aliyun Container Registry
        uses: docker/login-action@v3
        with:
          registry: registry.cn-qingdao.aliyuncs.com
          username: ${{ secrets.REGISTRY_USER_ALIYUN }}
          password: ${{ secrets.REGISTRY_PASSWORD_ALIYUN }}

      - name: Build and push video2x build image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./.beagle/dockerfile.build
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.BUILD_VERSION }}-build
          build-args: |
            BASE=nvidia/cuda:${{ env.CUDA_VERSION }}-devel-ubuntu24.04
            AUTHOR=${{ github.repository_owner }}
            VERSION=${{ env.BUILD_VERSION }}-build

      - name: Build complete
        run: echo "video2x ${{ env.BUILD_VERSION }}-build pushed successfully to Aliyun!"
